appId: com.leanote.desktop
productName: Leanote
copyright: Copyright (c) Leanote

files:
  - main.js
  - preload.js
  - note.html
  - login.html
  - "src/**/*"
  - "public/**/*"
  - "data/**/*"
  - "!dev/**"
  - "!docs/**"
  - "!tests/**"
  - "!.git/**"
  - "!*.md"
  - "!preview.png"
  - "!build/**"

asar: true

linux:
  target:
    - target: deb
      arch:
        - x64
  category: Office
  icon: build/icons

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/images/ico/256.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/images/logo/leanote.png
  category: public.app-category.productivity

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/images/ico/256.ico
  uninstallerIcon: public/images/ico/256.ico
  installerHeaderIcon: public/images/ico/256.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Leanote
